<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="他米地板产品线">
    <title>他米产品线 | 他米 TAMI</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body data-page="tami" data-brand="他米">
    <header class="site-header">
      <a class="brand-mark" href="index.html" aria-label="他米 TAMI 首页">TAMI</a>
      <nav class="site-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="search.html">产品查询</a>
      </nav>
    </header>

    <main class="catalog-page">
      <section class="page-intro page-intro-compact">
        <p class="eyebrow">TAMI Flooring Collection</p>
        <h1>他米地板产品线</h1>
        <p>自动展示 <span class="code-text">products.json</span> 中品牌为他米的产品，覆盖实木、多层实木、3层实木与强化地板。</p>
      </section>

      <section class="toolbar" aria-label="产品筛选">
        <label class="search-box">
          <span>搜索产品 / 编号</span>
          <input id="searchInput" type="search" placeholder="输入产品名称或ID，如 S1001" autocomplete="off">
        </label>

        <label class="select-box">
          <span>产品分类</span>
          <select id="categoryFilter">
            <option value="all">全部分类</option>
          </select>
        </label>
      </section>

      <section class="catalog-status" aria-live="polite">
        <p id="resultCount">正在读取产品数据...</p>
      </section>

      <section id="productGrid" class="product-grid" aria-label="他米产品列表"></section>
    </main>

    <div id="productModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" type="button" data-close-modal aria-label="关闭详情">×</button>
        <div class="modal-image-wrap">
          <img id="modalImage" src="" alt="">
        </div>
        <div class="modal-content">
          <p id="modalMeta" class="eyebrow"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDesc"></p>
          <dl class="detail-list">
            <div>
              <dt>产品编号</dt>
              <dd id="modalId"></dd>
            </div>
            <div>
              <dt>编码解析</dt>
              <dd id="modalIdRule"></dd>
            </div>
            <div>
              <dt>品牌</dt>
              <dd id="modalBrand"></dd>
            </div>
            <div>
              <dt>分类</dt>
              <dd id="modalCategory"></dd>
            </div>
            <div>
              <dt>适用空间</dt>
              <dd id="modalScene"></dd>
            </div>
            <div>
              <dt>表面风格</dt>
              <dd id="modalFinish"></dd>
            </div>
          </dl>
        </div>
      </article>
    </div>

    <script src="assets/js/app.js" defer></script>
  </body>
</html>

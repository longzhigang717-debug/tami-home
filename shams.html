<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>山姆仕产品系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

.header{
  background:#111;
  color:white;
  padding:40px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:white;
  border-radius:10px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.img{
  height:120px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">
  <h1>山姆仕产品线</h1>
</div>

<div class="grid">

  <div class="card">
    <div class="img">图片位</div>
    <b>橡木浅色系列</b>
    <p>现代 / 极简 / 原木风</p>
  </div>

  <div class="card">
    <div class="img">图片位</div>
    <b>胡桃木深色系列</b>
    <p>轻奢 / 中古风</p>
  </div>

  <div class="card">
    <div class="img">图片位</div>
    <b>工程耐磨系列</b>
    <p>高流量商业空间</p>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>产品查询系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
  text-align:center;
}

header{
  background:#111;
  color:white;
  padding:30px;
}

input{
  width:80%;
  padding:12px;
  margin:20px;
  font-size:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.img{
  height:120px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <h1>产品查询系统</h1>
</header>

<input type="text" id="searchBox" placeholder="输入产品名称 / 分类 / 品牌">

<div class="grid" id="result"></div>

<script>
// 读取 products.json
let products = [];

fetch('products.json')
.then(res => res.json())
.then(data => {
  products = data;
  render(products);
});

// 搜索
document.getElementById('searchBox').addEventListener('input', function(){
  let keyword = this.value.toLowerCase();

  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(keyword) ||
    p.category.toLowerCase().includes(keyword) ||
    p.brand.toLowerCase().includes(keyword)
  );

  render(filtered);
});

// 渲染
function render(list){
  let box = document.getElementById('result');
  box.innerHTML = '';

  list.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <div class="img">
          <img src="${p.img}" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <b>${p.name}</b>
        <p>${p.desc}</p>
        <small>${p.brand} | ${p.category}</small>
      </div>
    `;
  });
}
</script>

</body>
</html>
